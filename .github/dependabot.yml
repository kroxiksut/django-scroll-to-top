# Dependabot keeps the three dependency surfaces this repo actually uses in
# sync: the Python package (pyproject), the npm lint/typecheck tooling, and the
# GitHub Actions used in CI. Actions are pinned to commit SHAs in the workflow
# files; the github-actions ecosystem below bumps both the SHA and its version
# comment automatically, so pinning stays maintainable.
version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # One grouped PR for all action bumps. This keeps multi-step actions in
    # lockstep — notably github/codeql-action init + analyze, which fail at
    # runtime ("Loaded a configuration file for version X, but running Y") if
    # they are ever pinned to different versions.
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
