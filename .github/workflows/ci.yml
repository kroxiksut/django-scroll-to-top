name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip ruff pyright django-stubs
      - run: python -m pip install .
      - run: ruff check src tests
      - run: python -m pyright

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Django 4.2 LTS supports Python 3.10-3.12.
          - python-version: "3.10"
            django: "Django>=4.2,<4.3"
          - python-version: "3.11"
            django: "Django>=4.2,<4.3"
          - python-version: "3.12"
            django: "Django>=4.2,<4.3"
          # Django 5.0 supports Python 3.10-3.12.
          - python-version: "3.10"
            django: "Django>=5.0,<5.1"
          - python-version: "3.12"
            django: "Django>=5.0,<5.1"
          # Django 5.1 supports Python 3.10-3.13.
          - python-version: "3.11"
            django: "Django>=5.1,<5.2"
          - python-version: "3.13"
            django: "Django>=5.1,<5.2"
          # Django 5.2 LTS supports Python 3.10-3.13.
          - python-version: "3.10"
            django: "Django>=5.2,<5.3"
          - python-version: "3.12"
            django: "Django>=5.2,<5.3"
          - python-version: "3.13"
            django: "Django>=5.2,<5.3"
          # Django 6.0 supports Python 3.12-3.14.
          - python-version: "3.12"
            django: "Django>=6.0,<6.1"
          - python-version: "3.13"
            django: "Django>=6.0,<6.1"
          - python-version: "3.14"
            django: "Django>=6.0,<6.1"
    name: test (py${{ matrix.python-version }}, ${{ matrix.django }})
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install "${{ matrix.django }}" pytest pytest-django
      - run: python -m pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      # Install the freshly built wheel into a clean venv and render the tag +
      # admin, so missing template/static/locale/SVG package-data fails CI — the
      # src-based test suite cannot catch packaging gaps.
      - name: Clean-install smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install dist/*.whl
          /tmp/smoke/bin/python tools/smoke_install.py

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pip-audit
      # Scan the installed dependency tree for known vulnerabilities.
      - run: python -m pip install .
      - run: python -m pip_audit
