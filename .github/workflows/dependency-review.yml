name: Dependency Review

# Flags pull requests that introduce known-vulnerable dependencies across the
# whole dependency graph (Python and the npm JS tooling), before they merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
