[tox]
# Compatibility matrix across the supported Django LTS/feature releases.
# Python/Django combinations follow each Django version's supported Python range.
envlist =
    py310-dj42
    py311-dj42
    py312-dj42
    py310-dj52
    py311-dj52
    py312-dj52
    py313-dj52
    py312-dj60
    py313-dj60
    py314-dj60
    lint
isolated_build = true

[testenv]
description = Run the test suite against a specific Django version
deps =
    pytest
    pytest-django
    dj42: Django>=4.2,<4.3
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
commands =
    python -m pytest {posargs}

[testenv:lint]
description = Run ruff lint checks
skip_install = true
deps = ruff
commands =
    ruff check src tests
